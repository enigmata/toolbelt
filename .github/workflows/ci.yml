name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Pick an iPhone simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          echo "SIMULATOR=$DEVICE" >> "$GITHUB_ENV"

      - name: Build and run unit tests
        run: |
          xcodebuild test \
            -project toolbelt.xcodeproj \
            -scheme toolbelt \
            -destination "platform=iOS Simulator,name=${SIMULATOR}" \
            -only-testing:toolbeltTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project toolbelt.xcodeproj \
            -scheme toolbelt \
            -destination "platform=iOS Simulator,name=${SIMULATOR}" \
            -only-testing:toolbeltUITests \
            CODE_SIGNING_ALLOWED=NO
